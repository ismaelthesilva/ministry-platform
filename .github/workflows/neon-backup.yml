name: Neon Database Backup

on:
  schedule:
    - cron: "0 14 * * *" # Every day at 2am NZ
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create backup directory
        run: mkdir -p prisma/backup

      - name: Set date
        run: echo "BACKUP_DATE=$(date +%Y-%m-%d-%H%M)" >> $GITHUB_ENV

      - name: Create backup
        run: |
          BACKUP_FILE="prisma/backup/bible-dev-backup-${{ env.BACKUP_DATE }}.dump"

          /usr/lib/postgresql/17/bin/pg_dump "${{ secrets.NEON_PRODUCTION_URL }}" \
            --format=custom \
            --no-owner \
            --no-acl \
            --file="$BACKUP_FILE"

          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

          ls -lh "$BACKUP_FILE"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: backup-${{ env.BACKUP_DATE }}
          name: Database Backup ${{ env.BACKUP_DATE }}
          files: ${{ env.BACKUP_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Keep last 30 releases
        uses: dev-drprasad/delete-older-releases@v0.3.2
        with:
          keep_latest: 30
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
